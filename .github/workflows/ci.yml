name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: Publish the rolling edge image or the validated release
        required: true
        type: choice
        default: edge
        options:
          - edge
          - release

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.0
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.12'
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e '.[test]'
      - name: Resolve package version
        id: version
        shell: bash
        run: |
          package_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          module_version="$(python -c 'from pr_review_runner import __version__; print(__version__)')"
          if [ "${package_version}" != "${module_version}" ]; then
            echo "pyproject version ${package_version} does not match module version ${module_version}" >&2
            exit 1
          fi
          if [[ ! "${package_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Package version must use X.Y.Z format" >&2
            exit 1
          fi
          echo "version=${package_version}" >> "${GITHUB_OUTPUT}"
      - name: Run tests
        run: python -m pytest
      - name: Check Python style
        run: python -m ruff check . && python -m ruff format --check .
      - name: Build container
        run: docker build --tag pr-review-runner:test .
      - name: Smoke-test entrypoint
        run: docker run --rm pr-review-runner:test --version

  publish-edge:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'edge'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: pr-review-runner-image
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Validate edge source
        env:
          SOURCE_REF: ${{ github.ref }}
        run: |
          if [ "${SOURCE_REF}" != "refs/heads/main" ]; then
            echo "Edge images must be built from main" >&2
            exit 1
          fi
      - name: Check out source
        uses: actions/checkout@v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push edge image
        id: build
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/infinitypacer/pr-review-runner:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Attest image provenance
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-name: ghcr.io/infinitypacer/pr-review-runner
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Summarize edge image
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "Edge: ghcr.io/infinitypacer/pr-review-runner:edge"
            echo "Digest: ${IMAGE_DIGEST}"
          } >> "${GITHUB_STEP_SUMMARY}"

  publish-release:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'release'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: pr-review-runner-image
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - name: Validate release source
        env:
          SOURCE_REF: ${{ github.ref }}
        run: |
          if [ "${SOURCE_REF}" != "refs/heads/main" ]; then
            echo "Release images must be published from main" >&2
            exit 1
          fi
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Resolve validated edge image
        id: edge
        env:
          VERSION: ${{ needs.test.outputs.version }}
        run: |
          edge_version="$(docker run --rm ghcr.io/infinitypacer/pr-review-runner:edge --version)"
          if [ "${edge_version}" != "${VERSION}" ]; then
            echo "edge version ${edge_version} does not match local package version ${VERSION}" >&2
            exit 1
          fi
          digest="$(docker buildx imagetools inspect ghcr.io/infinitypacer/pr-review-runner:edge --format '{{json .Manifest.Digest}}' | tr -d '"')"
          if [[ ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Unable to resolve edge image digest" >&2
            exit 1
          fi
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
      - name: Protect immutable version tag
        env:
          SOURCE_DIGEST: ${{ steps.edge.outputs.digest }}
          VERSION: ${{ needs.test.outputs.version }}
        run: |
          error_file="$(mktemp)"
          if existing="$(docker buildx imagetools inspect "ghcr.io/infinitypacer/pr-review-runner:${VERSION}" --format '{{json .Manifest.Digest}}' 2>"${error_file}")"; then
            existing="$(printf '%s' "${existing}" | tr -d '"')"
            if [[ ! "${existing}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Unable to resolve the existing ${VERSION} digest" >&2
              exit 1
            fi
          elif grep -Eqi '(manifest unknown|name unknown|not found: manifest|: not found$)' "${error_file}"; then
            existing=""
          else
            cat "${error_file}" >&2
            exit 1
          fi
          rm -f "${error_file}"
          if [ -n "${existing}" ] && [ "${existing}" != "${SOURCE_DIGEST}" ]; then
            echo "Version ${VERSION} already points to ${existing}; refusing to replace it with ${SOURCE_DIGEST}" >&2
            exit 1
          fi
      - name: Publish version and latest
        env:
          SOURCE_DIGEST: ${{ steps.edge.outputs.digest }}
          VERSION: ${{ needs.test.outputs.version }}
        run: >-
          docker buildx imagetools create
          --tag "ghcr.io/infinitypacer/pr-review-runner:${VERSION}"
          --tag ghcr.io/infinitypacer/pr-review-runner:latest
          "ghcr.io/infinitypacer/pr-review-runner@${SOURCE_DIGEST}"
      - name: Verify release tags
        env:
          SOURCE_DIGEST: ${{ steps.edge.outputs.digest }}
          VERSION: ${{ needs.test.outputs.version }}
        run: |
          for tag in "${VERSION}" latest; do
            actual="$(docker buildx imagetools inspect "ghcr.io/infinitypacer/pr-review-runner:${tag}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
            if [ "${actual}" != "${SOURCE_DIGEST}" ]; then
              echo "${tag} points to ${actual}, expected ${SOURCE_DIGEST}" >&2
              exit 1
            fi
          done
      - name: Summarize release
        env:
          IMAGE_DIGEST: ${{ steps.edge.outputs.digest }}
          VERSION: ${{ needs.test.outputs.version }}
        run: |
          {
            echo "Release: ghcr.io/infinitypacer/pr-review-runner:${VERSION}"
            echo "Latest: ghcr.io/infinitypacer/pr-review-runner:latest"
            echo "Digest: ${IMAGE_DIGEST}"
          } >> "${GITHUB_STEP_SUMMARY}"
